<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股市梗圖專區</title>
    <style>
        :root {
            --primary-color: #4A90E2;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: var(--text-color);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        /* 網格佈局核心 */
        .meme-grid {
            display: grid;
            /* 自動填滿，每張圖最小寬度 300px */
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 梗圖卡片樣式 */
        .meme-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .meme-card:hover {
            transform: translateY(-5px);
        }

        /* 圖片容器 */
        .meme-image-container {
            width: 100%;
            background-color: #eee;
            /* 保持圖片比例，或者設定固定高度 */
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .meme-image-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 文字說明區塊 */
        .meme-info {
            padding: 15px;
            border-top: 1px solid #eee;
        }

        .meme-title {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: var(--primary-color);
        }

        .meme-desc {
            font-size: 0.95rem;
            color: #666;
            line-height: 1.4;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            text-decoration: none;
            color: var(--primary-color);
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="header">
    <a href="index.html" class="back-btn">← 回首頁</a>
    <h1 style="background-color: #50E3C2">股市系列梗圖</h1>
</div>

<div class="meme-grid">

    <div class="meme-card">
        <div class="meme-image-container">
            <img src="Image/SongLa.png" alt="凹單有多爽">
        </div>
        <div class="meme-info">
            <div class="meme-title">凹單有多爽</div>
            <div class="meme-desc">一時凹單一時爽，<br>一直凹單一直爽。</div>
        </div>
    </div>

    <div class="meme-card">
        <div class="meme-image-container">
            <img src="Image/StopLoss.png" alt="停損">
        </div>
        <div class="meme-info">
            <div class="meme-title">停損</div>
            <div class="meme-desc">停損有那麼重要嗎? <br>(突然一根大黑K)</div>
        </div>
    </div>

    <div class="meme-card">
        <div class="meme-image-container">
            <img src="Image/ItsLove.png" alt="像極了愛情">
        </div>
        <div class="meme-info">
            <div class="meme-title">像極了愛情</div>
            <div class="meme-desc">進場需要勇氣， <br>出場更需要勇氣， <br>像極了愛情。</div>
        </div>
    </div>

    </div>

</body>
</html>
