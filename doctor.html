<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>醫生梗圖專區</title>
    <style>
        :root {
            --primary-color: #4A90E2;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: var(--text-color);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        /* 網格佈局核心 */
        .meme-grid {
            display: grid;
            /* 自動填滿，每張圖最小寬度 300px */
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 梗圖卡片樣式 */
        .meme-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .meme-card:hover {
            transform: translateY(-5px);
        }

        /* 圖片容器 */
        .meme-image-container {
            width: 100%;
            background-color: #eee;
            /* 保持圖片比例，或者設定固定高度 */
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .meme-image-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 文字說明區塊 */
        .meme-info {
            padding: 15px;
            border-top: 1px solid #eee;
        }

        .meme-title {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: var(--primary-color);
        }

        .meme-desc {
            font-size: 0.95rem;
            color: #666;
            line-height: 1.4;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            text-decoration: none;
            color: var(--primary-color);
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="header">
    <a href="./index.html" class="back-btn">← 回首頁</a>
    <h1 style="background-color: #4A90E2">醫生系列梗圖</h1>
</div>

<div class="meme-grid">

    <div class="meme-card">
        <div class="meme-image-container">
            <img src="Image/HalfDeaf.webp" alt="半聾">
        </div>
        <div class="meme-info">
            <div class="meme-title">半聾</div>
            <div class="meme-desc">病人 : 「醫生，我耳朵好像半聾了，聽東西總是只能聽一半。<br>醫生 : 「是嗎？那我來測試一下，88...」<br>病人 : 「44」</div>
        </div>
    </div>

    <div class="meme-card">
        <div class="meme-image-container">
            <img src="Image/DontDoThatAgain.jpg" alt="不要給我這樣做">
        </div>
        <div class="meme-info">
            <div class="meme-title">肩膀痛</div>
            <div class="meme-desc">阿罵 : 「醫生我只要這樣肩膀就會很痛。」 <br>醫生 : 「那你就不要給我這樣。」</div>
        </div>
    </div>

    <div class="meme-card">
        <div class="meme-image-container">
            <img src="Image/WakeUpInTheAfternoon.jpg" alt="下午起床吧">
        </div>
        <div class="meme-info">
            <div class="meme-title">下午再起床吧</div>
            <div class="meme-desc">病人 : 「醫生我早上起來腰都很痛。」 <br>醫生 : 「那就下午再起床就好啦。」<br>病人 : 「水啦~」</div>
        </div>
    </div>

    </div>

</body>
</html>
